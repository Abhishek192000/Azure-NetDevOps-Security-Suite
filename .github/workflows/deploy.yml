name: "Project 2: NetDevOps Secure Validation Pipeline"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  secure_validation:
    name: "Static Code Analysis"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3

      - name: Setup Terraform Engine
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.5

      - name: Gate 1 Code Format Check
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Gate 2 Static Security Scan
        run: echo "Skipping linter checks for initial setup verification"

      - name: Gate 3 Initialize Project 1 Environment
        run: terraform -chdir=01_Enterprise_Secure_Landing_Zone init -backend=false

      - name: Gate 4 Validate Project 1 Blueprint
        run: terraform -chdir=01_Enterprise_Secure_Landing_Zone validate

      - name: Gate 5 Initialize Project 3 Environment
        run: terraform -chdir=03_PaloAlto_NVA_Cloud_Perimeter init -backend=false

      - name: Gate 6 Validate Project 3 Blueprint
        run: terraform -chdir=03_PaloAlto_NVA_Cloud_Perimeter validate
